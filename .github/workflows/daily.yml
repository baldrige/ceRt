name: Daily SCOTUS dashboards

# Fetches the current term three times a day and republishes the daily petitions
# dashboards to the gh-pages branch (served by GitHub Pages). The conference
# archive already on gh-pages is preserved untouched.
#
# Prerequisite (one-time): a gh-pages branch must exist (see the bootstrap notes
# in the setup instructions), and Pages must be set to deploy from gh-pages.

on:
  schedule:
    # Cron is UTC and does NOT observe US daylight saving, so the ET-anchored
    # runs below are set for EDT (UTC-4); during standard time (Nov-Mar) they
    # land one hour earlier in ET.
    - cron: "30 0 * * *"   # ~00:30 UTC, shortly after the ~00:05 UTC JSON re-export
    - cron: "0 18 * * *"   # 2pm ET (EDT); 1pm ET during standard time
    - cron: "0 22 * * *"   # 6pm ET (EDT); 5pm ET during standard time
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-dashboards
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v5

      - name: Checkout published site (gh-pages) into ./site
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site

      - name: Install system dependencies (poppler + tesseract for pdftools/OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoppler-cpp-dev libtesseract-dev tesseract-ocr libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gt
            any::gtExtras
            any::tidyverse
            any::httr2
            any::jsonlite
            any::pdftools
            any::htmltools

      - name: Build dashboards into ./site
        env:
          SITE_DIR: site
          TERM_YEAR: "26"
        run: Rscript .github/scripts/build_dashboards.R

      - name: Commit and publish changes
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Guard the custom-domain config: GitHub Pages serves supremecourt.report
          # only while this CNAME file exists at the gh-pages root. Re-assert it on
          # every publish so a future rebuild can never drop the domain.
          echo "supremecourt.report" > CNAME
          # Site favicon lives at the repo root; re-assert it on every publish
          # (like CNAME) so /favicon.svg and /favicon.ico stay at the gh-pages root.
          cp ../favicon.svg ../favicon.ico . 2>/dev/null || true
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Daily dashboard refresh $(date -u +%F)"
            # Publishing races with the conferences workflow and manual deploys,
            # which also push to gh-pages. A bare push is rejected (non-fast-
            # forward) when the branch moved, silently dropping this render, so
            # rebase onto the latest tip and retry. Daily touches dashboards/ +
            # the landing index; conferences touch conferences/ + funnel/, so the
            # rebase is conflict-free.
            for i in 1 2 3 4 5; do
              if git push origin gh-pages; then exit 0; fi
              echo "push rejected; rebasing onto latest gh-pages (attempt $i)"
              git pull --rebase origin gh-pages
              sleep $((RANDOM % 5 + 3))
            done
            echo "still could not publish after 5 attempts" >&2
            exit 1
          fi
