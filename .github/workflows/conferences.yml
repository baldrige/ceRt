name: Conference reports

# Rebuilds the current sitting's conference reports and merges them into the
# gh-pages archive. Each term is fetched in its own job (separate runner IP) to
# keep sustained per-IP load -- and Akamai throttling -- down.
#
#   scheduled: Mondays, in-season (Jul/Aug recess auto-skipped), auto terms
#   manual:    optionally pass explicit `terms` (e.g. 24,25) to backfill

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      terms:
        description: "Terms to fetch, comma-separated (e.g. 24,25). Blank = current sitting (auto)."
        required: false
        default: ""
      min_conf_date:
        description: "Render conferences on/after (YYYY-MM-DD). Blank = auto from terms."
        required: false
        default: ""
      qp_max_new:
        description: "Max new QP petition PDFs to fetch this run (raise for a one-time backfill)."
        required: false
        default: "600"

permissions:
  contents: write

concurrency:
  group: conference-reports
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      min_conf: ${{ steps.plan.outputs.min_conf }}
      skip: ${{ steps.plan.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - id: plan
        env:
          INPUT_TERMS: ${{ inputs.terms }}
          INPUT_MIN: ${{ inputs.min_conf_date }}
          EVENT_NAME: ${{ github.event_name }}
        run: Rscript .github/scripts/plan_terms.R

  fetch:
    needs: setup
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 200
    strategy:
      fail-fast: true
      matrix:
        term: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoppler-cpp-dev libtesseract-dev tesseract-ocr libcurl4-openssl-dev
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gt
            any::gtExtras
            any::tidyverse
            any::httr2
            any::jsonlite
            any::pdftools
            any::htmltools
      - name: Fetch OT ${{ matrix.term }}
        env:
          TERM_YEAR: ${{ matrix.term }}
          OUT_FILE: cases-${{ matrix.term }}.rds
        run: Rscript .github/scripts/fetch_term.R
      - uses: actions/upload-artifact@v4
        with:
          name: cases-${{ matrix.term }}
          path: cases-${{ matrix.term }}.rds
          retention-days: 3

  publish:
    needs: [setup, fetch]
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v5
      - name: Checkout published site (gh-pages) into ./site
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoppler-cpp-dev libtesseract-dev tesseract-ocr libcurl4-openssl-dev
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gt
            any::gtExtras
            any::tidyverse
            any::httr2
            any::jsonlite
            any::pdftools
            any::htmltools
      - name: Download term artifacts
        uses: actions/download-artifact@v4
        with:
          path: cases
          pattern: cases-*
          merge-multiple: true
      - name: Render conferences
        env:
          SITE_DIR: site
          CASES_DIR: cases
          MIN_CONF_DATE: ${{ needs.setup.outputs.min_conf }}
          QP_MAX_NEW: ${{ inputs.qp_max_new || '600' }}
        run: Rscript .github/scripts/render_conferences.R
      - name: Render cert funnel
        # Never let a funnel failure block conference publishing.
        continue-on-error: true
        env:
          SITE_DIR: site
          CASES_DIR: cases
        run: Rscript .github/scripts/render_funnel.R
      - name: Render argument navigator
        # Never let an argument-nav failure block conference publishing.
        continue-on-error: true
        env:
          SITE_DIR: site
          CASES_DIR: cases
          # Fetch newly-granted cases' Question-Presented PDFs (small text PDFs,
          # no OCR) so the cache stays current. Safe here: the publish runner is
          # fresh (it did no JSON-API fetching).
          QP_MAX_NEW: "200"
        run: Rscript .github/scripts/render_arguments.R
      - name: Commit and publish
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Guard the custom-domain config: GitHub Pages serves supremecourt.report
          # only while this CNAME file exists at the gh-pages root. Re-assert it on
          # every publish so a future rebuild can never drop the domain.
          echo "supremecourt.report" > CNAME
          # Site favicon lives at the repo root; re-assert it on every publish
          # (like CNAME) so /favicon.svg and /favicon.ico stay at the gh-pages root.
          cp ../favicon.svg ../favicon.ico . 2>/dev/null || true
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Conference refresh $(date -u +%F)"
            # Publishing races with the daily workflow and manual deploys, which
            # also push to gh-pages. A bare push is rejected (non-fast-forward)
            # when the branch moved, silently dropping this render, so rebase
            # onto the latest tip and retry. Conferences touch conferences/ +
            # funnel/; daily touches dashboards/ + the landing index, so the
            # rebase is conflict-free.
            for i in 1 2 3 4 5; do
              if git push origin gh-pages; then exit 0; fi
              echo "push rejected; rebasing onto latest gh-pages (attempt $i)"
              git pull --rebase origin gh-pages
              sleep $((RANDOM % 5 + 3))
            done
            echo "still could not publish after 5 attempts" >&2
            exit 1
          fi
