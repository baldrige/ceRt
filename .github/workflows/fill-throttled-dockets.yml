name: Fill throttled docket pages

# Mop-up for the brief-cover backfill: the full-term fetch loses a small % of
# dockets to throttling (they keep their pre-template page). This fetches ONLY
# those stale dockets per term -- a few hundred each rather than the whole term,
# so throttling is far less likely -- then renders them with the current template
# and commits once. Incremental + re-dispatchable: re-run until no term reports
# any stale pages left.

on:
  workflow_dispatch:
    inputs:
      terms:
        description: "Comma-separated 2-digit terms. Blank = 17,18,19,20,21,22,23,24,25."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: rerender-dockets      # share the backfill's lane so the two never race on gh-pages
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
    steps:
      - id: p
        run: |
          terms="${{ inputs.terms }}"
          if [ -z "$terms" ]; then terms="17,18,19,20,21,22,23,24,25"; fi
          json=$(echo "$terms" | tr ',' '\n' | sed 's/[^0-9]//g;/^$/d;s/^/"/;s/$/"/' | paste -sd, -)
          echo "matrix=[$json]" >> "$GITHUB_OUTPUT"
          echo "terms: [$json]"

  fetch:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        term: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v5
      - name: Checkout published site (gh-pages) into ./site
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site
      - name: System dependencies (poppler + tesseract for pdftools/OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoppler-cpp-dev libtesseract-dev tesseract-ocr libcurl4-openssl-dev
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R packages (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gt
            any::gtExtras
            any::tidyverse
            any::httr2
            any::jsonlite
            any::pdftools
            any::htmltools
      - name: Fetch OT ${{ matrix.term }} stale dockets
        env:
          TERM_YEAR: ${{ matrix.term }}
          SITE_DIR: site
          OUT_FILE: cases-${{ matrix.term }}.rds
        run: Rscript .github/scripts/fetch_missing_dockets.R
      - name: Upload term snapshot
        uses: actions/upload-artifact@v4
        continue-on-error: true    # no stale pages for this term -> no rds -> skip upload
        with:
          name: cases-${{ matrix.term }}
          path: cases-${{ matrix.term }}.rds
          retention-days: 5
          if-no-files-found: ignore

  render:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v5
      - name: Checkout published site (gh-pages) into ./site
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site
      - name: System dependencies (poppler + tesseract for pdftools/OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoppler-cpp-dev libtesseract-dev tesseract-ocr libcurl4-openssl-dev
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R packages (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gt
            any::gtExtras
            any::tidyverse
            any::httr2
            any::jsonlite
            any::pdftools
            any::htmltools
      - name: Download term snapshots
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: snapshots
          pattern: cases-*
          merge-multiple: true
      - name: Re-render filled docket pages into ./site
        env:
          SITE_DIR: site
          RDS_DIR: snapshots
        run: Rscript .github/scripts/render_dockets_backfill.R
      - name: Commit and publish changes
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "supremecourt.report" > CNAME
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Fill throttled docket pages (brief-cover backfill) $(date -u +%F)"
            for i in 1 2 3 4 5; do
              if git push origin gh-pages; then exit 0; fi
              echo "push rejected; rebasing onto latest gh-pages (attempt $i)"
              git pull --rebase origin gh-pages
              sleep $((RANDOM % 5 + 3))
            done
            echo "still could not publish after 5 attempts" >&2
            exit 1
          fi
